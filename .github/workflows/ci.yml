name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e .
      - name: Unit tests
        run: python -m unittest discover -s tests
      - name: Compile Python
        run: python -m py_compile trmnl_agent_usage/*.py scripts/audit_public_repo.py tests/*.py
      - name: Validate shell wrapper
        run: sh -n scripts/claude_statusline_capture_wrapper.sh
      - name: Validate examples
        run: |
          python -m json.tool examples/codex.sample.json >/dev/null
          python -m json.tool examples/claude.sample.json >/dev/null
      - name: Audit public repository content and history
        run: python scripts/audit_public_repo.py --history
      - name: Check whitespace
        run: git diff --check
